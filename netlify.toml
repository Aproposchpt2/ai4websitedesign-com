[build]
  publish   = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"
  SECRETS_SCAN_OMIT_KEYS = "RESEND_TO_EMAIL,RESEND_FROM_EMAIL,OWNER_NOTIFICATION_EMAIL,CLIENT_NOTIFICATION_EMAIL,SUPABASE_URL,SUPABASE_PUBLISHABLE_KEY,SUPABASE_SERVICE_KEY"

[functions]
  node_bundler = "esbuild"

[functions."generate-agency"]
  timeout = 26

# Prevent stale HTML while testing and deploying
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Friendly short routes
[[redirects]]
  from = "/studio"
  to   = "/ai4-design-studio.html"
  status = 200

[[redirects]]
  from = "/preview"
  to   = "/ai4-design-studio-preview.html"
  status = 200

# Spanish site
[[redirects]]
  from = "/es"
  to   = "https://espanol.ai4websitedesign.com"
  status = 301
[[edge_functions]]
  path = "/api/generate-agency"
  function = "generate-agency"
