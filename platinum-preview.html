<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI4 Platinum Website Preview</title>
<style>
:root{--bg:#030816;--line:rgba(255,255,255,.14);--text:#f6f8ff;--muted:#9cafc8;--accent:#5bd3ff;--ok:#22d87a;--bad:#ff4f6d}*{box-sizing:border-box}html,body{height:100%;margin:0;background:var(--bg)}.bar{display:flex;align-items:center;gap:14px;padding:12px 18px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.02),transparent)}.brand{font-weight:900;color:var(--text);letter-spacing:.02em}
.btn{background:transparent;border:1px solid var(--line);color:var(--text);padding:8px 12px;border-radius:10px;cursor:pointer;font-weight:800}
.stage{position:relative;height:calc(100% - 58px);display:flex}
iframe{border:0;width:100%;height:100%;background:#fff}
.overlay{position:absolute;right:18px;top:18px;z-index:40;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.pill{background:#061022;color:var(--muted);padding:6px 10px;border-radius:999px;border:1px solid var(--line);font-weight:800}
.spin{width:36px;height:36px;border-radius:50%;border:3px solid rgba(255,255,255,.06);border-top-color:var(--accent);animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ribbon{display:none;flex:0 0 auto;align-items:center;gap:16px;flex-wrap:nowrap;padding:9px 16px;background:#050b18;border-bottom:1px solid var(--line);overflow-x:auto}
.ribbon.show{display:flex}
.rg{display:flex;align-items:center;gap:8px;flex:0 0 auto}
.rg .lab{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:800}
.swatches{display:flex;gap:6px}
.sw{width:26px;height:26px;border-radius:50%;border:2px solid transparent;cursor:pointer;display:grid;place-items:center;padding:0;transition:transform .12s}
.sw:hover{transform:scale(1.12)}.sw i{width:9px;height:9px;border-radius:50%;display:block}.sw.on{border-color:#fff}
.rb{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;transition:all .12s}
.rb:hover{color:var(--text);border-color:rgba(255,255,255,.4)}.rb.on{background:#fff;color:#04101a;border-color:#fff}
.rdiv{width:1px;height:24px;background:var(--line);flex:0 0 auto}
.ctl{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:8px 12px;font-size:12px;font-weight:800;cursor:pointer}
.ctl:hover{border-color:rgba(91,211,255,.4)}.ctl .cval{color:var(--accent)}.ctl .car{color:var(--muted);font-size:10px}
.pop{position:fixed;z-index:60;background:#08101f;border:1px solid var(--line);border-radius:14px;padding:12px;box-shadow:0 24px 70px rgba(0,0,0,.55);display:none;width:min(92vw,330px);max-height:62vh;overflow:auto}
.pop.show{display:block}
.pop .ph{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:800;margin-bottom:9px}
.popswatch{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.poplist{display:flex;flex-wrap:wrap;gap:6px}
.optb{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:999px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer}
.optb:hover{color:var(--text);border-color:rgba(255,255,255,.4)}.optb.on{background:#fff;color:#04101a;border-color:#fff}
</style>
</head>
<body>
<div class="bar"><div class="brand">AI4 Platinum Preview</div><button class="btn" id="buildBtn" onclick="build('full')">Build</button><button class="btn" id="newBtn" onclick="build('design')">New Design</button><button class="btn" id="clearBtn" onclick="clearAndBuild()">Clear</button><div style="flex:1"></div><div class="pill" id="status">Idle</div></div>
<div class="ribbon" id="ribbon"></div>
<div class="stage"><iframe id="frame" title="Generated website preview"></iframe><div class="overlay show" id="overlay"><div class="pill" id="stagePill">Ready</div><div class="spin" id="spin" style="display:none"></div></div></div>
<script src="/ai4-render.js"></script>
<script>
'use strict';
const START='/.netlify/functions/start-website-build';
const WORKER='/.netlify/functions/generate-website-background';
const STATUS='/.netlify/functions/get-build-status';
let answers=null, html='', meta={}, jobId='', pollTimer=null;
const $=id=>document.getElementById(id);
const stages=['queued','creative-brief','platinum-agent-call','quality-gate','completed'];
// Live styling state — the agent writes the copy once; these re-skin it instantly client-side.
let style={copy:null,theme:'',layout:'',font:'',size:'m',style:'standard'};
function AR(){return window.AI4Render}
function persistStyle(){try{sessionStorage.setItem('ai4_built_html',html);sessionStorage.setItem('ai4_style_state',JSON.stringify({theme:style.theme,layout:style.layout,font:style.font,size:style.size,style:style.style}));}catch(e){}
}
function applyStyling(){if(!style.copy||!AR())return false;html=AR().render(style.copy,style.theme,style.layout,style.font,style.size,style.style);$('frame').srcdoc=html;persistStyle();return true}
const CTRLS=[{k:'theme',lab:'Color',sw:true},{k:'layout',lab:'Layout'},{k:'font',lab:'Type'},{k:'size',lab:'Size'},{k:'style',lab:'Style'}];
function optsFor(k){const A=AR();if(!A)return[];if(k==='theme')return A.THEMES.map(function(t){return{id:t.id,name:t.name,bg:t.bg,accent:t.accent}});if(k==='layout')return A.LAYOUTS||[];if(k==='font')return[{id:'',name:'Default'}];if(k==='size')return[{id:'s',name:'Small'},{id:'m',name:'Medium'},{id:'l',name:'Large'}];if(k==='style')return[{id:'standard',name:'Standard'},{id:'modern',name:'Modern'}];return[]}
function nameOf(k){const o=optsFor(k).filter(function(x){return x.id===style[k]})[0];return o?o.name:'—'}
function ribbonActive(){const r=$('ribbon');if(!r)return;[].forEach.call(r.querySelectorAll('[data-cval]'),function(el){el.textContent=nameOf(el.dataset.cval)})}
function buildRibbon(){const r=$('ribbon'),A=AR();if(!A||r.dataset.built)return;
  CTRLS.forEach(function(c){const b=document.createElement('button');b.className='ctl';b.dataset.ctl=c.k;b.innerHTML=c.lab+' <span class="cval" data-cval="'+c.k+'"></span> <span class="car">▾</span>';b.onclick=function(e){openPop(c,b)};r.appendChild(b)});
  r.dataset.built='1';
}
let _pop;
function ensurePop(){if(_pop)return _pop;_pop=document.createElement('div');_pop.className='pop';document.body.appendChild(_pop);_pop.onclick=function(e){e.stopPropagation()};return _pop}
function openPop(c,btn){const p=ensurePop(),opts=optsFor(c.k);p.innerHTML='<div class="ph">'+c.lab+'</div>';
  if(c.sw){const g=document.createElement('div');g.className='popswatch';opts.forEach(function(o){const s=document.createElement('button');s.className='sw'+(style[c.k]===o.id?' on':'');s.title=o.name;s.onclick=function(){pick(c.k,o.id)};const i=document.createElement('i');i.style.background=o.bg||o.accent||'#fff';s.appendChild(i);g.appendChild(s)});p.appendChild(g);}else{const g=document.createElement('div');g.className='poplist';opts.forEach(function(o){const b=document.createElement('button');b.className='optb'+(style[c.k]===o.id?' on':'');b.textContent=o.name;b.onclick=function(){pick(c.k,o.id)};g.appendChild(b)});p.appendChild(g)}
  const rect=btn.getBoundingClientRect();p.style.left=Math.max(8,Math.min(rect.left,window.innerWidth-340))+'px';p.style.top=(rect.bottom+8)+'px';p.classList.add('show');
}
function pick(k,v){style[k]=v;applyStyling();ribbonActive();closePop()}
function closePop(){if(_pop)_pop.classList.remove('show')}
document.addEventListener('click',closePop);
document.addEventListener('keydown',function(e){if(e.key==='Escape')closePop()});
function startStyling(meta){if(!AR()||!meta||!meta.copy)return false;style.copy=meta.copy;style.theme=meta.theme|| (AR().THEMES&&AR().THEMES[0]&&AR().THEMES[0].id)||'';style.layout=meta.layout||'split';buildRibbon();$('ribbon').classList.add('show');ribbonActive();applyStyling();return true}
function text(v,f=''){return String(v==null?f:v).trim()||f}
function readJson(k,f){try{return JSON.parse(sessionStorage.getItem(k)||localStorage.getItem(k)||'null')||f}catch(e){return f}}
function hasAnswers(){return answers&&typeof answers==='object'&&Object.keys(answers).length>0}
function sections(s){return (text(s).match(/<section\b/gi)||[]).length}
function invalidStored(s){const l=text(s).toLowerCase();return l.includes('fallback complete site')||l.includes('premium presence')||l.includes('generator unavailable')||l.includes('unable to create')}
function isComplete(s){return text(s).length>4500&&sections(s)>=4&&/<form[^>]+data-netlify=["']true["']/i.test(s)&&!invalidStored(s)}
function setButtons(disabled){['buildBtn','newBtn'].forEach(id=>{if($(id))$(id).disabled=!!disabled})}
function setProgress(p){let f=$('fill'); if(f) f.style.width=Math.max(0,Math.min(100,Number(p)||0))+'%'}
function setStatus(s){if($('status'))$('status').textContent=s||''}
function show(on,title,note,stage,progress){if($('overlay'))$('overlay').classList.toggle('show',!!on);if($('spin'))$('spin').style.display=on?'block':'none';if(title&&$('stagePill'))$('stagePill').textContent=title;}
function logRows(active){if($('log')) $('log').innerHTML=stages.map(s=>`<div class="log-row ${s===active?'active':stages.indexOf(s)<stages.indexOf(active)?'done':''}">${s.replace(/-/g,' ')}</div>`).join('')}
function render(s,m){html=s;meta=m||{};$('frame').srcdoc=s;let sel=$('selectBtn'); if(sel) sel.style.display='';show(false);setButtons(false);try{sessionStorage.setItem('ai4_generated_html',s);sessionStorage.setItem('ai4_gen_content',JSON.stringify(m||{}));}catch(e){}
}
function makePayload(mode){return{answers:answers||{},mode:mode||'full',existingContent:meta||null,variationSeed:Date.now().toString(36)+'-'+Math.random().toString(36).slice(2),background:true}}
async function startBackgroundBuild(payload){try{const res=await fetch(START,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});const data=await res.json().catch(()=>null);if(!data||!data.jobId)throw new Error('Failed to create job');jobId=data.jobId;triggerWorker(jobId,payload);return data}catch(e){console.warn(e);throw e}}
function triggerWorker(id,payload){fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({jobId:id,payload})}).catch(e=>console.warn('Background worker dispatch failed',e))}
async function pollJob(id){let attempts=0;return new Promise((resolve,reject)=>{clearInterval(pollTimer);pollTimer=setInterval(async()=>{attempts++;try{const res=await fetch(STATUS+'?jobId='+encodeURIComponent(id));const data=await res.json().catch(()=>null);if(data&&data.status){setStatus(data.status);setProgress(data.progress||0);logRows(data.stage||'queued');if(data.status==='completed'){clearInterval(pollTimer);resolve(data);}if(data.status==='failed'){clearInterval(pollTimer);reject(data);}}catch(e){if(attempts>60){clearInterval(pollTimer);reject(e);}}},2000)})}
async function build(mode){setButtons(true);$('selectBtn')&&($('selectBtn').style.display='none');$('ribbon').classList.remove('show');const payload=makePayload(mode);show(true,'Creating background build job...','Step 1 — scheduling',null,10);try{const data=await startBackgroundBuild(payload);show(true,'Building…','Background job created',null,20);const res=await pollJob(data.jobId);if(res&&res.html){render(res.html,res.meta);setStatus('Build complete');}else{setStatus('No HTML returned');} }catch(e){console.warn(e);setStatus('Build failed');}finally{setButtons(false)}
}
function clearAndBuild(){try{sessionStorage.removeItem('ai4_generated_html');sessionStorage.removeItem('ai4_built_html');sessionStorage.removeItem('ai4_templates');sessionStorage.removeItem('ai4_platinum_context');}catch(e){}location.reload()}
const OFFER_URL='https://ai4-product-purchasing.ai4businesses.org/webdesign-offer.html';
async function selectSite(){
  if(style.copy)applyStyling();
  var lead={};try{lead=JSON.parse(sessionStorage.getItem('ai4_lead')||'{}')}catch(e){}
  var biz=(style.copy&&style.copy.businessName)||(meta&&(meta.businessName||meta.business_name))||'';
  var nm=[lead.firstName,lead.lastName].filter(Boolean).join(' ');
  var p=new URLSearchParams();
  if(lead.promoCode)p.set('promo',lead.promoCode);
  if(jobId)p.set('jobId',jobId);
  if(lead.email)p.set('email',lead.email);
  if(nm)p.set('name',nm);
  if(lead.phone)p.set('phone',lead.phone);
  if(biz)p.set('biz',biz);
  p.set('theme',style.theme||'');p.set('layout',style.layout||'');p.set('font',style.font||'');p.set('size',style.size||'m');p.set('hs',style.style||'standard');
  try{sessionStorage.setItem('ai4_built_html',html);sessionStorage.setItem('ai4_checkout_context',JSON.stringify({meta,answers,jobId,lead,style:{theme:style.theme,layout:style.layout,font:style.font,size:style.size,style:style.style}}));}catch(e){}
  window.location.href=OFFER_URL+'?'+p.toString();
}
(function init(){answers=readJson('ai4_answers',{})||{};
  const savedCopy=readJson('ai4_copy_brief',null),savedStyle=readJson('ai4_style_state',null);
  if(savedCopy&&AR()){if(savedStyle){style.font=savedStyle.font||'';style.size=savedStyle.size||'m';style.style=savedStyle.style||'standard';}startStyling({copy:savedCopy,theme:(savedStyle&&savedStyle.theme)||'',layout:(savedStyle&&savedStyle.layout)||'',font:(savedStyle&&savedStyle.font)||''});}
  const old=sessionStorage.getItem('ai4_generated_html')||sessionStorage.getItem('ai4_built_html')||'';if(isComplete(old)){render(old,readJson('ai4_gen_content',{}));setStatus('Stored complete preview loaded');}
})();
</script>
</body>
</html>
