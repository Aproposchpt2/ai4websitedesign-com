<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI4 Platinum Website Preview</title>
<style>
:root{--bg:#030816;--panel:#071225;--line:rgba(255,255,255,.14);--text:#f6f8ff;--muted:#9cafc8;--accent:#5bd3ff;--accent2:#1ea7ff;--ok:#22d87a;--warn:#f5a623;--bad:#ff4f6d}*{box-sizing:border-box}html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:Inter,Arial,sans-serif;overflow:hidden}.bar{height:64px;display:flex;align-items:center;gap:12px;padding:0 18px;background:#050b18;border-bottom:1px solid var(--line)}.brand{font-weight:900;letter-spacing:.02em}.btn{border:1px solid rgba(91,211,255,.3);background:rgba(91,211,255,.1);color:var(--text);border-radius:999px;padding:10px 14px;font-weight:800;cursor:pointer}.btn.primary{margin-left:auto;background:linear-gradient(135deg,#fff,var(--accent));color:#04101a}.btn:disabled{opacity:.55;cursor:wait}.status{font-size:12px;color:var(--muted);max-width:520px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.meter{width:160px;height:8px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden}.fill{height:100%;width:0;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width .35s}.stage{height:calc(100% - 64px);position:relative}iframe{width:100%;height:100%;border:0;background:#fff}.overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;text-align:center;gap:14px;padding:28px;background:rgba(3,8,22,.94);z-index:3}.overlay.show{display:flex}.spin{width:46px;height:46px;border-radius:50%;border:4px solid rgba(91,211,255,.18);border-top-color:var(--accent);animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.note{color:var(--muted);max-width:620px;line-height:1.55}.pill{display:inline-flex;border:1px solid rgba(91,211,255,.25);border-radius:999px;padding:7px 11px;color:var(--accent);font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.08em}.log{width:min(560px,100%);display:grid;gap:8px;margin-top:14px;text-align:left}.log-row{border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:10px 12px;color:var(--muted);font-size:13px;background:rgba(255,255,255,.035)}.log-row.active{color:var(--accent);border-color:rgba(91,211,255,.28)}.log-row.done{color:var(--ok)}@media(max-width:820px){.brand,.status,.meter{display:none}.bar{gap:8px;padding:0 10px}.btn{font-size:12px;padding:8px 10px}}
</style>
</head>
<body>
<div class="bar"><div class="brand">AI4 Platinum Preview</div><button class="btn" id="buildBtn" onclick="build('full')">Build</button><button class="btn" id="newBtn" onclick="build('design')">New Design</button><button class="btn" onclick="clearAndBuild()">Rebuild Fresh</button><div class="meter"><div class="fill" id="fill"></div></div><div class="status" id="status"></div><button class="btn primary" id="selectBtn" onclick="selectSite()" style="display:none">Select This Site</button></div>
<div class="stage"><iframe id="frame" title="Generated website preview"></iframe><div class="overlay show" id="overlay"><div class="pill" id="stagePill">Queued</div><div class="spin" id="spin"></div><h2 id="otitle">Building your complete promotional website...</h2><div class="note" id="onote">The AI4 Platinum Agent is running in the background so the browser will not time out.</div><div class="log" id="log"></div></div></div>
<script>
'use strict';
const CREATE='/.netlify/functions/create-build-job';
const STATUS='/.netlify/functions/get-build-status';
const SYNC='/.netlify/functions/generate-website';
const SAVE='/.netlify/functions/save-build';
let answers=null, html='', meta={}, jobId='', pollTimer=null;
const $=id=>document.getElementById(id);
const stages=['queued','creative-brief','platinum-agent-call','quality-gate','completed'];
function text(v,f=''){return String(v==null?f:v).trim()||f}
function safe(v){return text(v).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function readJson(k,f){try{return JSON.parse(sessionStorage.getItem(k)||localStorage.getItem(k)||'null')||f}catch(e){return f}}
function get(keys,f=''){for(const k of keys){if(answers&&answers[k])return text(answers[k])}return f}
function sections(s){return (text(s).match(/<section\b/gi)||[]).length}
function isComplete(s){return text(s).length>9000&&sections(s)>=5&&/<form[^>]+data-netlify=["']true["']/i.test(s)}
function setButtons(disabled){['buildBtn','newBtn'].forEach(id=>{if($(id))$(id).disabled=!!disabled})}
function setProgress(p){$('fill').style.width=Math.max(0,Math.min(100,Number(p)||0))+'%'}
function setStatus(s){$('status').textContent=s||''}
function show(on,title,note,stage,progress){$('overlay').classList.toggle('show',!!on);$('spin').style.display=on?'block':'none';if(title)$('otitle').textContent=title;if(note)$('onote').textContent=note;if(stage)$('stagePill').textContent=stage.replace(/-/g,' ');if(progress!==undefined)setProgress(progress);}
function logRows(active){$('log').innerHTML=stages.map(s=>`<div class="log-row ${s===active?'active':stages.indexOf(s)<stages.indexOf(active)?'done':''}">${s.replace(/-/g,' ')}</div>`).join('')}
function render(s,m){html=s;meta=m||{};$('frame').srcdoc=s;$('selectBtn').style.display='';show(false);setButtons(false);try{sessionStorage.setItem('ai4_generated_html',s);sessionStorage.setItem('ai4_built_html',s);sessionStorage.setItem('ai4_gen_content',JSON.stringify(meta))}catch(e){}}
function business(){return get(['businessName','business_name','brandName','companyName','name'],'Your Business')}
function buildFallback(reason){const b=safe(business()),what=safe(get(['whatYouDo','what','businessDescription','description','services'],'A premium business serving customers with professional solutions.')),who=safe(get(['customers','who','idealCustomers','targetAudience','audience'],'customers who value trust, clarity, and a professional experience')),diff=safe(get(['differentiators','diff','whatMakesDifferent','uniqueValue','whyDifferent'],'clear communication, dependable service, and a polished customer experience')),cta=safe(get(['primaryCta','cta','ctaText','callToAction'],'Contact Us')),phone=safe(get(['phone','phoneNumber','contactPhone'],'')),email=safe(get(['email','contactEmail'],'')),address=safe(get(['address','addr','location','serviceArea'],'')),year=new Date().getFullYear();return `<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${b}</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet"><style>:root{--bg:#06101d;--ink:#f8fbff;--muted:#a7b5c8;--panel:rgba(255,255,255,.075);--line:rgba(255,255,255,.13);--accent:#38bdf8;--accent2:#f6c768}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;background:radial-gradient(circle at 15% 5%,rgba(56,189,248,.28),transparent 34%),linear-gradient(135deg,#06101d,#0d1627 56%,#05070c);color:var(--ink);line-height:1.65}a{color:inherit;text-decoration:none}.wrap{max-width:1180px;margin:auto;padding:0 24px}nav{position:sticky;top:0;z-index:10;background:rgba(6,16,29,.84);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}.nav{min-height:78px;display:flex;align-items:center;justify-content:space-between;gap:20px}.brand{font-family:Syne,sans-serif;font-size:25px;font-weight:800}.btn{display:inline-flex;border-radius:999px;background:linear-gradient(135deg,#fff,var(--accent));color:#04101a;padding:14px 22px;font-weight:900}.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}section{padding:82px 0}.hero{min-height:calc(100vh - 78px);display:grid;place-items:center;padding:92px 0}.hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:48px;align-items:center}.eyebrow{letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-size:12px;font-weight:900}.hero h1{font-family:Syne,sans-serif;font-size:clamp(54px,8vw,106px);line-height:.9;letter-spacing:-.075em;margin:18px 0}.lead{font-size:clamp(18px,2vw,23px);color:var(--muted);max-width:720px}.visual{min-height:470px;border:1px solid var(--line);border-radius:38px;background:linear-gradient(145deg,rgba(255,255,255,.11),rgba(255,255,255,.03));box-shadow:0 40px 120px rgba(0,0,0,.35);padding:34px;display:flex;flex-direction:column;justify-content:space-between}.badge{display:inline-flex;width:max-content;border:1px solid var(--line);border-radius:999px;padding:10px 14px;color:var(--accent2);font-weight:900;font-size:12px;text-transform:uppercase;letter-spacing:.08em}.metric{font-family:Syne,sans-serif;font-size:58px;line-height:.9}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.card{border:1px solid var(--line);border-radius:26px;padding:28px;background:var(--panel)}.card span{color:var(--accent);font-weight:900}.card h3{font-family:Syne,sans-serif;font-size:28px;line-height:1;margin:16px 0}.split{display:grid;grid-template-columns:.9fr 1.1fr;gap:40px;align-items:start}.kicker{font-family:Syne,sans-serif;font-size:42px;line-height:1;letter-spacing:-.045em;margin:0}.list{display:grid;gap:14px}.item{border-left:3px solid var(--accent);padding:12px 0 12px 18px;color:var(--muted)}.process{counter-reset:step;display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.step{counter-increment:step;border:1px solid var(--line);border-radius:24px;padding:24px;background:rgba(0,0,0,.18)}.step:before{content:'0' counter(step);color:var(--accent2);font-weight:900}.cta-band{border:1px solid var(--line);border-radius:36px;padding:46px;background:linear-gradient(135deg,rgba(56,189,248,.18),rgba(246,199,104,.12));display:flex;align-items:center;justify-content:space-between;gap:24px}.contact{display:grid;grid-template-columns:.85fr 1.15fr;gap:28px}.contact-box,form{border:1px solid var(--line);border-radius:30px;background:var(--panel);padding:30px}form{display:grid;gap:14px}input,textarea{width:100%;border:1px solid var(--line);background:rgba(0,0,0,.24);color:var(--ink);border-radius:16px;padding:15px;font:inherit}textarea{min-height:130px}button{border:0;cursor:pointer}.footer{padding:32px 0;border-top:1px solid var(--line);color:var(--muted);font-size:14px}@media(max-width:900px){.hero-grid,.split,.contact{grid-template-columns:1fr}.cards,.process{grid-template-columns:1fr}.nav{height:auto;align-items:flex-start;flex-direction:column;padding:18px 0}.visual{min-height:330px}.cta-band{align-items:flex-start;flex-direction:column}}</style></head><body><nav><div class="wrap nav"><div class="brand">${b}</div><a class="btn" href="#contact">${cta}</a></div></nav><main><section class="hero"><div class="wrap hero-grid"><div><div class="eyebrow">Complete Promotional Website Preview</div><h1>${b}</h1><p class="lead">${what}</p><p class="lead">Built to help ${who} quickly understand the value, trust the brand, and take the next step.</p><p><a class="btn" href="#contact">${cta}</a> <a class="btn ghost" href="#services">Explore Services</a></p></div><aside class="visual"><span class="badge">Fallback Complete Site</span><div><div class="metric">Premium presence</div><p class="lead">A full-page promotional structure is displayed while the AI generator is unavailable.</p></div><span class="badge">${safe(reason)}</span></aside></div></section><section id="services"><div class="wrap"><div class="split"><h2 class="kicker">What ${b} helps customers do.</h2><div class="cards"><article class="card"><span>01</span><h3>Clear Offering</h3><p>${what}</p></article><article class="card"><span>02</span><h3>Customer Fit</h3><p>Designed for ${who}.</p></article><article class="card"><span>03</span><h3>Reason to Choose</h3><p>${diff}</p></article></div></div></div></section><section><div class="wrap split"><h2 class="kicker">Why visitors should feel confident.</h2><div class="list"><div class="item">Focused messaging that explains the business without generic filler.</div><div class="item">A strong conversion path from first impression to contact.</div><div class="item">A polished visual identity that feels ready for client presentation.</div><div class="item">Mobile-friendly structure for visitors on every device.</div></div></div></section><section><div class="wrap"><h2 class="kicker">Simple customer journey.</h2><div class="process"><div class="step"><h3>Discover</h3><p>Visitors understand the offer immediately.</p></div><div class="step"><h3>Evaluate</h3><p>They see who it is for and why it matters.</p></div><div class="step"><h3>Trust</h3><p>They get clear proof and a professional experience.</p></div><div class="step"><h3>Act</h3><p>They contact the business through the form.</p></div></div></div></section><section><div class="wrap"><div class="cta-band"><div><h2 class="kicker">Ready to move forward?</h2><p class="lead">Use the contact form and tell ${b} what you need.</p></div><a class="btn" href="#contact">${cta}</a></div></div></section><section id="contact"><div class="wrap contact"><div class="contact-box"><h2 class="kicker">Contact ${b}</h2>${phone?`<p><b>Phone:</b> ${phone}</p>`:''}${email?`<p><b>Email:</b> ${email}</p>`:''}${address?`<p><b>Location:</b> ${address}</p>`:''}<p>This fallback is complete, but it is not labeled Platinum Ready because the AI generation service did not provide the final output.</p></div><form name="contact" method="POST" data-netlify="true"><input type="hidden" name="form-name" value="contact"><input name="name" placeholder="Your name" required><input name="email" type="email" placeholder="Email address" required><input name="phone" placeholder="Phone number"><textarea name="message" placeholder="Tell us what you need"></textarea><button class="btn" type="submit">${cta}</button></form></div></section></main><footer class="footer"><div class="wrap">© ${year} ${b}. Built with AI4 Website Design. Fallback reason: ${safe(reason)}</div></footer></body></html>`}
async function startBackgroundBuild(mode){const payload={answers:answers||{},mode:mode||'full',existingContent:meta||null,background:true};const res=await fetch(CREATE,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});const data=await res.json().catch(()=>({}));if(!res.ok||!data.jobId)throw new Error(data.error||'Unable to create background build job');jobId=data.jobId;try{sessionStorage.setItem('ai4_platinum_job_id',jobId)}catch(e){}return data}
async function pollJob(id){let attempts=0;return new Promise((resolve,reject)=>{clearInterval(pollTimer);pollTimer=setInterval(async()=>{attempts++;try{const res=await fetch(STATUS+'?jobId='+encodeURIComponent(id));const data=await res.json().catch(()=>({}));if(data.status){setStatus((data.status||'running')+' · '+(data.message||''));show(true,data.message||'Building your website...', 'The Platinum build is processing in the background.', data.stage||data.status, data.progress||20);logRows(data.stage||data.status)}if(data.status==='completed'){clearInterval(pollTimer);resolve(data)}if(data.status==='failed'){clearInterval(pollTimer);reject(new Error(data.error||data.message||'Background build failed'))}if(attempts>150){clearInterval(pollTimer);reject(new Error('Background build timed out while polling'))}}catch(e){if(attempts>8){clearInterval(pollTimer);reject(e)}}},1800)})}
async function build(mode){setButtons(true);show(true,'Starting background Platinum build...','Creating a job so the browser will not time out.','queued',5);logRows('queued');setStatus('Starting background build...');try{const job=await startBackgroundBuild(mode);const data=await pollJob(job.jobId);let out=data.html||data.builtHtml||data.websiteHtml||'';if(!isComplete(out)){throw new Error('Background build returned thin or incomplete HTML')}meta=data.siteData||data.brief||data.content||{};render(out,meta);setStatus((data.quality&&data.quality.status?data.quality.status:'Completed')+' · '+sections(out)+' sections');}catch(e){console.warn('Background build failed; trying synchronous generator:',e.message);await syncBuild(mode,e.message)}}
async function syncBuild(mode,reason){show(true,'Trying fast backup generator...','If the background path is not deployed yet, AI4 will try the synchronous generator once.', 'sync-backup', 45);setStatus('Trying sync backup...');try{const res=await fetch(SYNC,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({answers:answers||{},mode:mode||'full',existingContent:meta||null})});let data={};try{data=await res.json()}catch(e){}let out=data.html||data.builtHtml||data.websiteHtml||'';if(!res.ok)throw new Error(data.error||('Generator HTTP '+res.status));if(!isComplete(out))throw new Error('Sync generator returned incomplete HTML');meta=data.siteData||data.brief||data.content||{};render(out,meta);setStatus((data.quality&&data.quality.status?data.quality.status:'Generated')+' · '+sections(out)+' sections');}catch(e){const out=buildFallback(reason||e.message||'Generator unavailable');render(out,{quality:{score:72,status:'Fallback Preview'}});setStatus('Complete fallback rendered · generator unavailable');}}
function clearAndBuild(){try{sessionStorage.removeItem('ai4_generated_html');sessionStorage.removeItem('ai4_built_html');sessionStorage.removeItem('ai4_templates');sessionStorage.removeItem('ai4_platinum_job_id')}catch(e){}html='';build('full')}
async function selectSite(){try{sessionStorage.setItem('ai4_built_html',html);sessionStorage.setItem('ai4_checkout_context',JSON.stringify({meta,answers,jobId,ts:Date.now()}))}catch(e){}const email=get(['email','contactEmail'],'');const name=get(['fullName','full_name'],'');const businessName=business();if(!email){window.location.href='offer.html';return}try{setStatus('Saving selected site...');await fetch(SAVE,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,full_name:name,business_name:businessName,built_html:html,site_data:{meta,answers,jobId},template_selected:'PLATINUM-BACKGROUND',source:'platinum-preview'})})}catch(e){}window.location.href='offer.html'}
function load(){answers=readJson('ai4_answers',null)||readJson('ai4_design_answers',null)||readJson('ai4_site_data',null)||{};const saved=sessionStorage.getItem('ai4_generated_html')||sessionStorage.getItem('ai4_built_html')||'';const urlJob=new URLSearchParams(location.search).get('jobId');const savedJob=sessionStorage.getItem('ai4_platinum_job_id')||'';if(isComplete(saved)){render(saved,readJson('ai4_gen_content',{}));setStatus('Stored full preview loaded · '+sections(saved)+' sections');return}if(urlJob||savedJob){jobId=urlJob||savedJob;show(true,'Checking build job...','Looking for your completed Platinum website.', 'status-check', 10);pollJob(jobId).then(data=>{const out=data.html||data.builtHtml||data.websiteHtml||'';if(isComplete(out))render(out,data.siteData||data.brief||{});else build('full')}).catch(()=>build('full'));return}build('full')}
load();
</script>
</body>
</html>
