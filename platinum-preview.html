<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI4 Platinum Website Preview</title>
<style>
:root{--bg:#030816;--panel:#071225;--line:rgba(255,255,255,.14);--text:#f6f8ff;--muted:#9cafc8;--accent:#5bd3ff;--accent2:#1ea7ff}*{box-sizing:border-box}html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:Inter,Arial,sans-serif;overflow:hidden}.bar{height:58px;display:flex;align-items:center;gap:12px;padding:0 18px;background:#050b18;border-bottom:1px solid var(--line)}.brand{font-weight:900;letter-spacing:.02em}.btn{border:1px solid rgba(91,211,255,.3);background:rgba(91,211,255,.1);color:var(--text);border-radius:999px;padding:10px 14px;font-weight:800;cursor:pointer}.btn.primary{margin-left:auto;background:linear-gradient(135deg,#fff,var(--accent));color:#04101a}.btn:disabled{opacity:.55}.status{font-size:12px;color:var(--muted);max-width:420px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.stage{height:calc(100% - 58px);position:relative}iframe{width:100%;height:100%;border:0;background:#fff}.overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;text-align:center;gap:14px;padding:28px;background:rgba(3,8,22,.92)}.overlay.show{display:flex}.spin{width:46px;height:46px;border-radius:50%;border:4px solid rgba(91,211,255,.18);border-top-color:var(--accent);animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.note{color:var(--muted);max-width:560px;line-height:1.55}@media(max-width:720px){.brand,.status{display:none}.bar{gap:8px;padding:0 10px}.btn{font-size:12px;padding:8px 10px}}
</style>
</head>
<body>
<div class="bar"><div class="brand">AI4 Platinum Preview</div><button class="btn" onclick="build('full')">Build</button><button class="btn" onclick="build('design')">New Design</button><button class="btn" onclick="clearAndBuild()">Rebuild Fresh</button><div class="status" id="status"></div><button class="btn primary" id="selectBtn" onclick="selectSite()" style="display:none">Select This Site</button></div>
<div class="stage"><iframe id="frame" title="Generated website preview"></iframe><div class="overlay show" id="overlay"><div class="spin" id="spin"></div><h2 id="otitle">Building your complete promotional website...</h2><div class="note" id="onote">The AI4 Platinum Agent is preparing a full website with sections beyond the hero.</div></div></div>
<script>
'use strict';
const GEN='/.netlify/functions/generate-website';
const SAVE='/.netlify/functions/save-build';
let answers=null, html='', meta={};
const $=id=>document.getElementById(id);
function text(v,f=''){return String(v==null?f:v).trim()||f}
function safe(v){return text(v).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function get(keys,f=''){for(const k of keys){if(answers&&answers[k])return text(answers[k])}return f}
function sections(s){return (text(s).match(/<section\b/gi)||[]).length}
function isComplete(s){return text(s).length>9000&&sections(s)>=6&&/<form[^>]+data-netlify=["']true["']/i.test(s)}
function show(on,title,note){$('overlay').classList.toggle('show',!!on);$('spin').style.display=on?'block':'none';if(title)$('otitle').textContent=title;if(note)$('onote').textContent=note}
function setStatus(s){$('status').textContent=s||''}
function render(s,m){html=s;meta=m||{};$('frame').srcdoc=s;$('selectBtn').style.display='';show(false);try{sessionStorage.setItem('ai4_generated_html',s);sessionStorage.setItem('ai4_built_html',s);sessionStorage.setItem('ai4_gen_content',JSON.stringify(meta))}catch(e){}}
function business(){return get(['businessName','business_name','brandName','companyName','name'],'Your Business')}
function completeFallback(reason){const b=safe(business()),what=safe(get(['whatYouDo','businessDescription','description','services'],'A premium business serving customers with professional solutions.')),who=safe(get(['customers','idealCustomers','targetAudience','audience'],'customers who value trust, clarity, and a professional experience')),diff=safe(get(['differentiators','whatMakesDifferent','uniqueValue','whyDifferent'],'clear communication, dependable service, and a polished customer experience')),cta=safe(get(['primaryCta','cta','ctaText','callToAction'],'Contact Us')),phone=safe(get(['phone','phoneNumber','contactPhone'],'')),email=safe(get(['email','contactEmail'],'')),address=safe(get(['address','location','serviceArea'],'')),year=new Date().getFullYear();return `<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${b}</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet"><style>:root{--bg:#06101d;--ink:#f8fbff;--muted:#a7b5c8;--panel:rgba(255,255,255,.075);--line:rgba(255,255,255,.13);--accent:#38bdf8;--accent2:#f6c768}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;background:radial-gradient(circle at 15% 5%,rgba(56,189,248,.28),transparent 34%),linear-gradient(135deg,#06101d,#0d1627 56%,#05070c);color:var(--ink);line-height:1.65}a{color:inherit;text-decoration:none}.wrap{max-width:1180px;margin:auto;padding:0 24px}nav{position:sticky;top:0;z-index:10;background:rgba(6,16,29,.84);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}.nav{height:78px;display:flex;align-items:center;justify-content:space-between;gap:20px}.brand{font-family:Syne,sans-serif;font-size:25px;font-weight:800}.btn{display:inline-flex;border-radius:999px;background:linear-gradient(135deg,#fff,var(--accent));color:#04101a;padding:14px 22px;font-weight:900}.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}section{padding:82px 0}.hero{min-height:calc(100vh - 78px);display:grid;place-items:center;padding:92px 0}.hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:48px;align-items:center}.eyebrow{letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-size:12px;font-weight:900}.hero h1{font-family:Syne,sans-serif;font-size:clamp(54px,8vw,106px);line-height:.9;letter-spacing:-.075em;margin:18px 0}.lead{font-size:clamp(18px,2vw,23px);color:var(--muted);max-width:720px}.visual{min-height:470px;border:1px solid var(--line);border-radius:38px;background:linear-gradient(145deg,rgba(255,255,255,.11),rgba(255,255,255,.03));box-shadow:0 40px 120px rgba(0,0,0,.35);padding:34px;display:flex;flex-direction:column;justify-content:space-between}.badge{display:inline-flex;width:max-content;border:1px solid var(--line);border-radius:999px;padding:10px 14px;color:var(--accent2);font-weight:900;font-size:12px;text-transform:uppercase;letter-spacing:.08em}.metric{font-family:Syne,sans-serif;font-size:58px;line-height:.9}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.card{border:1px solid var(--line);border-radius:26px;padding:28px;background:var(--panel)}.card span{color:var(--accent);font-weight:900}.card h3{font-family:Syne,sans-serif;font-size:28px;line-height:1;margin:16px 0}.split{display:grid;grid-template-columns:.9fr 1.1fr;gap:40px;align-items:start}.kicker{font-family:Syne,sans-serif;font-size:42px;line-height:1;letter-spacing:-.045em;margin:0}.list{display:grid;gap:14px}.item{border-left:3px solid var(--accent);padding:12px 0 12px 18px;color:var(--muted)}.process{counter-reset:step;display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.step{counter-increment:step;border:1px solid var(--line);border-radius:24px;padding:24px;background:rgba(0,0,0,.18)}.step:before{content:'0' counter(step);color:var(--accent2);font-weight:900}.cta-band{border:1px solid var(--line);border-radius:36px;padding:46px;background:linear-gradient(135deg,rgba(56,189,248,.18),rgba(246,199,104,.12));display:flex;align-items:center;justify-content:space-between;gap:24px}.contact{display:grid;grid-template-columns:.85fr 1.15fr;gap:28px}.contact-box,form{border:1px solid var(--line);border-radius:30px;background:var(--panel);padding:30px}form{display:grid;gap:14px}input,textarea{width:100%;border:1px solid var(--line);background:rgba(0,0,0,.24);color:var(--ink);border-radius:16px;padding:15px;font:inherit}textarea{min-height:130px}button{border:0;cursor:pointer}.footer{padding:32px 0;border-top:1px solid var(--line);color:var(--muted);font-size:14px}@media(max-width:900px){.hero-grid,.split,.contact{grid-template-columns:1fr}.cards,.process{grid-template-columns:1fr}.nav{height:auto;align-items:flex-start;flex-direction:column;padding:18px 0}.visual{min-height:330px}.cta-band{align-items:flex-start;flex-direction:column}}</style></head><body><nav><div class="wrap nav"><div class="brand">${b}</div><a class="btn" href="#contact">${cta}</a></div></nav><main><section class="hero"><div class="wrap hero-grid"><div><div class="eyebrow">Complete Promotional Website Preview</div><h1>${b}</h1><p class="lead">${what}</p><p class="lead">Built to help ${who} quickly understand the value, trust the brand, and take the next step.</p><p><a class="btn" href="#contact">${cta}</a> <a class="btn ghost" href="#services">Explore Services</a></p></div><aside class="visual"><span class="badge">Fallback Complete Site</span><div><div class="metric">Premium presence</div><p class="lead">A full-page promotional structure is displayed while the AI generator is unavailable.</p></div><span class="badge">${reason}</span></aside></div></section><section id="services"><div class="wrap"><div class="split"><h2 class="kicker">What ${b} helps customers do.</h2><div class="cards"><article class="card"><span>01</span><h3>Clear Offering</h3><p>${what}</p></article><article class="card"><span>02</span><h3>Customer Fit</h3><p>Designed for ${who}.</p></article><article class="card"><span>03</span><h3>Reason to Choose</h3><p>${diff}</p></article></div></div></div></section><section><div class="wrap split"><h2 class="kicker">Why visitors should feel confident.</h2><div class="list"><div class="item">Focused messaging that explains the business without generic filler.</div><div class="item">A strong conversion path from first impression to contact.</div><div class="item">A polished visual identity that feels ready for client presentation.</div><div class="item">Mobile-friendly structure for visitors on every device.</div></div></div></section><section><div class="wrap"><h2 class="kicker">Simple customer journey.</h2><div class="process"><div class="step"><h3>Discover</h3><p>Visitors understand the offer immediately.</p></div><div class="step"><h3>Evaluate</h3><p>They see who it is for and why it matters.</p></div><div class="step"><h3>Trust</h3><p>They get clear proof and a professional experience.</p></div><div class="step"><h3>Act</h3><p>They contact the business through the form.</p></div></div></div></section><section><div class="wrap"><div class="cta-band"><div><h2 class="kicker">Ready to move forward?</h2><p class="lead">Use the contact form and tell ${b} what you need.</p></div><a class="btn" href="#contact">${cta}</a></div></div></section><section id="contact"><div class="wrap contact"><div class="contact-box"><h2 class="kicker">Contact ${b}</h2>${phone?`<p><b>Phone:</b> ${phone}</p>`:''}${email?`<p><b>Email:</b> ${email}</p>`:''}${address?`<p><b>Location:</b> ${address}</p>`:''}<p>This fallback is complete, but it is not labeled Platinum Ready because the AI generation service did not provide the final output.</p></div><form name="contact" method="POST" data-netlify="true"><input type="hidden" name="form-name" value="contact"><input name="name" placeholder="Your name" required><input name="email" type="email" placeholder="Email address" required><input name="phone" placeholder="Phone number"><textarea name="message" placeholder="Tell us what you need"></textarea><button class="btn" type="submit">${cta}</button></form></div></section></main><footer class="footer"><div class="wrap">© ${year} ${b}. Built with AI4 Website Design. Fallback reason: ${safe(reason)}</div></footer></body></html>`}
async function build(mode){show(true,'Building your complete promotional website...','Calling the AI4 Platinum generator.');setStatus('Generating...');try{const res=await fetch(GEN,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({answers:answers||{},mode:mode||'full',existingContent:meta||null})});let data={};try{data=await res.json()}catch(e){}let out=data.html||data.builtHtml||data.websiteHtml||'';if(!res.ok)throw new Error('Generator HTTP '+res.status);if(!isComplete(out)){out=completeFallback('AI returned thin or incomplete HTML');data.quality={score:74,status:'Complete Fallback Preview',message:'The AI response was not complete enough for a promotional site.'}}
meta=data.siteData||data.brief||data.content||{};render(out,meta);setStatus((data.quality&&data.quality.status?data.quality.status:'Generated')+' - '+sections(out)+' sections');}catch(e){const out=completeFallback(e.message||'Generator unavailable');render(out,{quality:{score:74,status:'Complete Fallback Preview'}});setStatus('Complete fallback rendered - generator unavailable');}}
function clearAndBuild(){try{sessionStorage.removeItem('ai4_generated_html');sessionStorage.removeItem('ai4_built_html');sessionStorage.removeItem('ai4_templates')}catch(e){}html='';build('full')}
async function selectSite(){try{sessionStorage.setItem('ai4_built_html',html);sessionStorage.setItem('ai4_checkout_context',JSON.stringify({meta:meta,answers:answers,ts:Date.now()}));window.location.href='offer.html'}catch(e){setStatus('Could not save selection')}}
(function init(){try{answers=JSON.parse(sessionStorage.getItem('ai4_answers')||'null')}catch(e){}const old=sessionStorage.getItem('ai4_generated_html')||sessionStorage.getItem('ai4_built_html')||'';if(isComplete(old)){render(old,{});setStatus('Stored complete preview loaded')}else build('full')})();
</script>
</body>
</html>
