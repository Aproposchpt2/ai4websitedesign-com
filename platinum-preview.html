<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI4 Platinum Website Preview</title>
<style>
:root{--bg:#030816;--line:rgba(255,255,255,.14);--text:#f6f8ff;--muted:#9cafc8;--accent:#5bd3ff;--ok:#22d87a;--bad:#ff4f6d}*{box-sizing:border-box}html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:Inter,Arial,sans-serif;overflow:hidden}.bar{height:64px;display:flex;align-items:center;gap:12px;padding:0 18px;background:#050b18;border-bottom:1px solid var(--line)}.brand{font-weight:900}.btn{border:1px solid rgba(91,211,255,.3);background:rgba(91,211,255,.1);color:var(--text);border-radius:999px;padding:10px 14px;font-weight:800;cursor:pointer}.btn.primary{margin-left:auto;background:linear-gradient(135deg,#fff,var(--accent));color:#04101a}.btn:disabled{opacity:.55;cursor:wait}.meter{width:170px;height:8px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden}.fill{height:100%;width:0;background:linear-gradient(90deg,#f6c768,var(--accent));transition:width .35s}.status{font-size:12px;color:var(--muted);max-width:520px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.stage{height:calc(100% - 64px);position:relative}iframe{width:100%;height:100%;border:0;background:#fff}.overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;text-align:center;gap:14px;padding:28px;background:rgba(3,8,22,.94);z-index:3}.overlay.show{display:flex}.spin{width:46px;height:46px;border-radius:50%;border:4px solid rgba(91,211,255,.18);border-top-color:var(--accent);animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.note{color:var(--muted);max-width:640px;line-height:1.55}.pill{display:inline-flex;border:1px solid rgba(91,211,255,.25);border-radius:999px;padding:7px 11px;color:var(--accent);font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.08em}.log{width:min(580px,100%);display:grid;gap:8px;margin-top:14px;text-align:left}.log-row{border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:10px 12px;color:var(--muted);font-size:13px;background:rgba(255,255,255,.035)}.log-row.active{color:var(--accent);border-color:rgba(91,211,255,.28)}.log-row.done{color:var(--ok)}@media(max-width:860px){.brand,.status,.meter{display:none}.bar{gap:8px;padding:0 10px}.btn{font-size:12px;padding:8px 10px}}
</style>
</head>
<body>
<div class="bar"><div class="brand">AI4 Platinum Preview</div><button class="btn" id="buildBtn" onclick="build('full')">Build</button><button class="btn" id="newBtn" onclick="build('design')">New Design</button><button class="btn" onclick="clearAndBuild()">Rebuild Fresh</button><div class="meter"><div class="fill" id="fill"></div></div><div class="status" id="status"></div><button class="btn primary" id="selectBtn" onclick="selectSite()" style="display:none">Select This Site</button></div>
<div class="stage"><iframe id="frame" title="Generated website preview"></iframe><div class="overlay show" id="overlay"><div class="pill" id="stagePill">Ready</div><div class="spin" id="spin" style="display:none"></div><h2 id="otitle">Ready to build your Platinum website</h2><div class="note" id="onote">Click Build or New Design. The AI4 Platinum Agent will run as a background job so the browser does not time out.</div><div class="log" id="log"></div></div></div>
<script>
'use strict';
const START='/.netlify/functions/start-website-build';
const WORKER='/.netlify/functions/generate-website-background';
const STATUS='/.netlify/functions/get-build-status';
let answers=null, html='', meta={}, jobId='', pollTimer=null;
const $=id=>document.getElementById(id);
const stages=['queued','creative-brief','platinum-agent-call','quality-gate','completed'];
function text(v,f=''){return String(v==null?f:v).trim()||f}
function readJson(k,f){try{return JSON.parse(sessionStorage.getItem(k)||localStorage.getItem(k)||'null')||f}catch(e){return f}}
function sections(s){return (text(s).match(/<section\b/gi)||[]).length}
function invalidStored(s){const l=text(s).toLowerCase();return l.includes('fallback complete site')||l.includes('premium presence')||l.includes('generator unavailable')||l.includes('unable to create background build job')}
function isComplete(s){return text(s).length>9000&&sections(s)>=5&&/<form[^>]+data-netlify=["']true["']/i.test(s)&&!invalidStored(s)}
function setButtons(disabled){['buildBtn','newBtn'].forEach(id=>{if($(id))$(id).disabled=!!disabled})}
function setProgress(p){$('fill').style.width=Math.max(0,Math.min(100,Number(p)||0))+'%'}
function setStatus(s){$('status').textContent=s||''}
function show(on,title,note,stage,progress){$('overlay').classList.toggle('show',!!on);$('spin').style.display=on?'block':'none';if(title)$('otitle').textContent=title;if(note)$('onote').textContent=note;if(stage)$('stagePill').textContent=stage.replace(/-/g,' ');if(progress!==undefined)setProgress(progress)}
function logRows(active){$('log').innerHTML=stages.map(s=>`<div class="log-row ${s===active?'active':stages.indexOf(s)<stages.indexOf(active)?'done':''}">${s.replace(/-/g,' ')}</div>`).join('')}
function render(s,m){html=s;meta=m||{};$('frame').srcdoc=s;$('selectBtn').style.display='';show(false);setButtons(false);try{sessionStorage.setItem('ai4_generated_html',s);sessionStorage.setItem('ai4_built_html',s);sessionStorage.setItem('ai4_gen_content',JSON.stringify(meta));if(jobId)sessionStorage.setItem('ai4_platinum_job_id',jobId)}catch(e){}}
function makePayload(mode){return{answers:answers||{},mode:mode||'full',existingContent:meta||null,variationSeed:Date.now().toString(36)+'-'+Math.random().toString(36).slice(2),background:true}}
async function startBackgroundBuild(payload){const res=await fetch(START,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});const data=await res.json().catch(()=>({}));if(!res.ok||!(data.jobId||data.buildId))throw new Error(data.error||'Unable to create background build job');jobId=data.jobId||data.buildId;try{sessionStorage.setItem('ai4_platinum_job_id',jobId)}catch(e){}return Object.assign(data,{jobId})}
function triggerWorker(id,payload){fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({jobId:id,payload})}).catch(e=>console.warn('Background worker dispatch warning:',e.message))}
async function pollJob(id){let attempts=0;return new Promise((resolve,reject)=>{clearInterval(pollTimer);pollTimer=setInterval(async()=>{attempts++;try{const res=await fetch(STATUS+'?jobId='+encodeURIComponent(id));const data=await res.json().catch(()=>({}));if(data.status){const stage=data.stage||data.status;setStatus((data.status||'running')+' · '+(data.message||''));show(true,data.message||'Building your website...', 'The Platinum Agent is working in the background. You can leave this tab open while it completes.', stage, data.progress||20);logRows(stage)}if(data.status==='completed'){clearInterval(pollTimer);resolve(data)}if(data.status==='failed'||data.status==='error'){clearInterval(pollTimer);reject(new Error(data.error||data.message||'Background build failed'))}if(attempts>300){clearInterval(pollTimer);reject(new Error('Background build timed out while polling'))}}catch(e){if(attempts>10){clearInterval(pollTimer);reject(e)}}},2000)})}
async function build(mode){setButtons(true);$('selectBtn').style.display='none';const payload=makePayload(mode);show(true,'Creating background build job...','Step 1 should finish quickly. The AI work starts after the job ID is created.','queued',5);logRows('queued');setStatus('Creating job...');try{const job=await startBackgroundBuild(payload);show(true,'Starting Platinum Agent...','Job created. Starting the long-running background build now.','queued',10);setStatus('Job created · starting background worker');triggerWorker(job.jobId,payload);const data=await pollJob(job.jobId);let out=data.html||data.builtHtml||data.websiteHtml||'';if(!isComplete(out))throw new Error('Background build returned thin or incomplete HTML');meta=data.siteData||data.brief||data.content||{};render(out,meta);setStatus((data.quality&&data.quality.status?data.quality.status:'Completed')+' · '+sections(out)+' sections');}catch(e){console.warn('Background build failed:',e.message);setButtons(false);show(true,'Background build did not complete',e.message+' — wait for Netlify deploy to finish, then click Rebuild Fresh.','failed',100);$('spin').style.display='none';setStatus('Background build failed')}}
function clearAndBuild(){try{sessionStorage.removeItem('ai4_generated_html');sessionStorage.removeItem('ai4_built_html');sessionStorage.removeItem('ai4_templates');sessionStorage.removeItem('ai4_platinum_job_id')}catch(e){}html='';jobId='';build('full')}
async function selectSite(){try{sessionStorage.setItem('ai4_built_html',html);sessionStorage.setItem('ai4_checkout_context',JSON.stringify({meta,answers,jobId,ts:Date.now()}))}catch(e){}window.location.href='offer.html'}
(function init(){answers=readJson('ai4_answers',{})||{};const old=sessionStorage.getItem('ai4_generated_html')||sessionStorage.getItem('ai4_built_html')||'';if(isComplete(old)){render(old,readJson('ai4_gen_content',{}));setStatus('Stored complete preview loaded')}else{show(true,'Ready to build your Platinum website','Click Build or New Design. Background generation avoids browser timeout.','ready',0);$('spin').style.display='none';logRows('queued')}})();
</script>
</body>
</html>
