<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI4 Design Studio — Opening Preview</title>
<meta http-equiv="refresh" content="0; url=preview.html">
<style>
:root{--bg:#030816;--blue:#5BD3FF;--text:#F5F8FF;--muted:#90A3BC}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 20% 8%,rgba(30,167,255,.18),transparent 32%),linear-gradient(135deg,#030816,#061225);color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;text-align:center;padding:2rem}
.card{max-width:560px;border:1px solid rgba(91,211,255,.2);background:rgba(255,255,255,.04);border-radius:28px;padding:2rem;box-shadow:0 30px 90px rgba(0,0,0,.35)}
h1{font-size:clamp(1.8rem,4vw,3rem);line-height:1;margin-bottom:.8rem}
p{color:var(--muted);line-height:1.6;margin-bottom:1.4rem}
a{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;background:linear-gradient(135deg,#fff,#8ee7ff 48%,#1EA7FF);color:#03101f;text-decoration:none;font-weight:900;padding:.85rem 1.2rem}
</style>
<script>
(function(){
  var target='preview.html'+window.location.search+window.location.hash;
  window.location.replace(target);
})();
</script>
</head>
<body>
  <main class="card">
    <h1>Opening your preview…</h1>
    <p>The AI4 Preview Control Center now runs through the Platinum generator and quality gate.</p>
    <a href="preview.html">Open Preview Control Center</a>
  </main>
</body>
</html>
